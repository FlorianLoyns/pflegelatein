<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d7377"/>
      <stop offset="100%" stop-color="#0a5c5f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#fbf9f3" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#fbf9f3" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Teal background tile -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect width="512" height="512" rx="96" fill="url(#glow)"/>

  <!-- Heart, smaller and lifted up -->
  <path d="M 256 148
           C 238 124, 208 98, 175 98
           C 130 98, 118 150, 132 197
           C 145 244, 198 294, 256 342
           C 314 294, 367 244, 380 197
           C 394 153, 380 104, 336 104
           C 302 104, 274 124, 256 148 Z"
        fill="rgba(251, 249, 243, 0.06)"
        stroke="#fbf9f3" stroke-width="9"
        stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Cor — Latin label below the heart -->
  <text x="256" y="425" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="62" font-style="italic" font-weight="500"
        fill="#fbf9f3" opacity="0.92" letter-spacing="6">Cor</text>
</svg>
